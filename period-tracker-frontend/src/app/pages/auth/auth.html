<div class="auth-container">
  <h2>{{ isLoginMode ? 'Login' : 'Sign Up' }}</h2>
  <form (submit)="onSubmit()">
    @if(!isLoginMode){
    <div>
      <input type="text" placeholder="Username" 
      [(ngModel)]="signUpData.username" name="signupUsername" 
      />
      <input type="text" placeholder="Password" 
      [(ngModel)]="signUpData.password" name="signupPassword" 
      />
      <input type="number" placeholder="Age" 
      [(ngModel)]="signUpData.age" name="age"
      />
      <input type="number" placeholder="Height (cm)" 
      [(ngModel)]="signUpData.height" name="height"
      />
      <input type="number" placeholder="Weight (kg)" 
      [(ngModel)]="signUpData.weight" name="Weight"
      />
      <input type="number" placeholder="Cycle Length (days)" 
      [(ngModel)]="signUpData.cycleLength" name="cycleLength"
      />
      <input type="number" placeholder="Period Duration (days)" 
      [(ngModel)]="signUpData.periodDuration" name="periodDuration"
      />
    </div>
}@else {
    <input type="text" placeholder="Username" 
    [(ngModel)]="loginData.username" name="loginUsername"
    />
    <input type="password" placeholder="Password" 
    [(ngModel)]="loginData.password" name="loginPassword"
    />
}
    <button type="submit">
      {{ isLoginMode ? 'Login' : 'Sign Up' }}
    </button>
  </form>
  <p (click)="toggleMode()" class="toggle-text">
    {{ isLoginMode ? 'New user? Sign Up' : 'Already have an account? Login' }}
  </p>



</div>
