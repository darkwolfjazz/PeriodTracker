<div class="setup-container">
  <button (click)="logout()">Logout</button>
  <h2>Setup Your Cycle</h2>

  <!-- Date Picker -->
  <mat-form-field appearance="outline">
    <mat-label>Last Period Date</mat-label>
    <input
      matInput
      [matDatepicker]="picker"
      [max]="today"
      [(ngModel)]="cycleData.lastPeriodDate"
    >
    <mat-datepicker-toggle
      matIconSuffix
      [for]="picker">
    </mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
  <!-- Cycle Length -->
  <mat-form-field appearance="outline">
    <mat-label>Cycle Length</mat-label>
    <input
      matInput
      type="number"
      [(ngModel)]="cycleData.cycleLength">
  </mat-form-field>
  <mat-form-field appearance="outline">

    <mat-label>Period Duration</mat-label>

    <input
      matInput
      type="number"
      [(ngModel)]="cycleData.periodDuration">
  </mat-form-field>
  <button mat-raised-button (click)="submit()">Save</button>

</div>
